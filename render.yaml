services:
  - type: web
    name: spendos-backend
    runtime: python
    rootDirectory: SpendOS_Backend/smart-procurement
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendos-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        fromService:
          name: spendos-frontend
          type: static
          property: url

  - type: static
    name: spendos-frontend
    runtime: node
    plan: free
    rootDirectory: SpendOS_Frontend
    buildCommand: npm install && npm run build
    publishPath: dist

databases:
  - name: spendos-db
    plan: free
