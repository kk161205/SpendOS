databases:
  - name: spendos-db
    databaseName: spendos
    user: spendos_user
    plan: free

services:
  - type: redis
    name: spendos-redis
    plan: free

  - type: web
    name: spendos-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd SpendOS_Backend/smart-procurement && python -m scripts.run_worker & uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: spendos-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
